<html>
<head>
    <style>
        body {
          font-family: Arial;
          font-size: 12px;
        }

        .ticket {
          width: 300px;
        }

        .title {
          text-align: center;
          font-weight: bold;
        }

        .line {
          border-top: 1px dashed black;
          margin: 10px 0;
        }
    </style>
</head>

<body>

<div class="ticket">

    <div class="title">
        OPTICA VISION
    </div>

    <div class="line"></div>

    <p>Orden: {{ orden_id }}</p>
    <p>Cliente: {{ cliente_nombre }}</p>
    <p>Fecha: {{ fecha }}</p>

    <div class="line"></div>

    <p>Transacción: {{ transaccion_id }}</p>
    <p>Método: {{ metodo_pago }}</p>
    <p>Monto abonado: ${{ monto }}</p>

    <div class="line"></div>

    <p>Total orden: ${{ total }}</p>
    <p>Total pagado: ${{ pagado }}</p>
    <p>Saldo restante: ${{ restante }}</p>

    <div class="line"></div>

    <p style="text-align:center">
        Gracias por su preferencia
    </p>

</div>

</body>
</html>
